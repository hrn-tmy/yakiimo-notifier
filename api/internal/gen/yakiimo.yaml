openapi: "3.0.0"
info:
  title: 焼き芋通知焼き上がり通知
  version: 1.0.0

paths:
  /user:
    post:
      summary: 会員登録
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createUserRequest"
      responses:
        201:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createUserResponse"
        500:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /target-users:
    get:
      summary: 焼き芋通知をする会員の取得
      responses:
        200:
          description: 対象会員取得成功レスポンス
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/targetUsersResponse"
        500:
          description: 対象会員取得異常終了レスポンス
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notify/ready:
    post:
      summary: 焼き芋の焼き上がりを通知
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/yakiimoNotificationRequest"
      responses:
        200:
          description: 焼き上がり通知正常レスポンス
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/yakiimoNotificationResponse"
        500:
          description: 焼き上がり通知異常レスポンス
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    createUserRequest:
      description: 会員登録用パラメータ
      type: object
      properties:
        name:
          description: 名前
          type: string
        email:
          description: メール
          type: string
        password:
          description: パスワード
          type: string
      required:
        - name
        - email
        - password
    createUserResponse:
      description: 会員登録成功レスポンス
      type: object
      properties:
        status:
          description: 処理終了ステータス
          type: integer
        user:
          description: 会員データ
          type: object
          $ref: "#/components/schemas/createUserResponseData"
      required:
        - status
        - user
    createUserResponseData:
      description: 会員データ
      type: object
      properties:
        name:
          description: 名前
          type: string
        email:
          description: メール
          type: string
        notification_permission:
          description: 通知許可
          type: boolean
      required:
        - name
        - email
        - notification_permission
    createUserErrorResponse:
      description: 会員登録失敗レスポンス
      type: object
      properties:
        status:
          description: 処理終了ステータス
          type: integer
        message:
          description: エラーメッセージ
    targetUsersResponse:
      description: 対象会員取得成功レスポンス
      type: object
      properties:
        status:
          description: 処理終了ステータス
          type: integer
        users:
          description: 対象会員
          type: array
          items:
            $ref: "#/components/schemas/targetUserData"
      required:
        - status
        - users
    targetUserData:
      description: 対象会員データ
      type: object
      properties:
        user_id:
          description: 会員ID
          type: string
          format: uuid
        email:
          description: メールアドレス
          type: string
        notification_permission:
          description: 通知許可
          type: boolean
      required:
        - user_id
        - email
        - notification_permission
    yakiimoNotificationRequest:
      description: 焼き芋通知焼き上がり通知パラメータ
      type: object
      properties:
        machine_id:
          type: string
          format: uuid
          description: 機械ID
        finished_at:
          type: string
          description: 焼き上がり時間
        quantity:
          type: integer
          description: 焼き上がり個数
      required:
        - machine_id
        - finished_at
        - quantity
    yakiimoNotificationResponse:
      type: object
      description: 焼き上がり通知正常レスポンス
      properties:
        status:
          type: integer
          description: 送信ステータス
        message:
          type: string
          description: エラーメッセージ
      required:
        - status
    ErrorResponse:
      description: エラーレスポンス
      type: object
      properties:
        status:
          type: integer
          description: 送信ステータス
        message:
          type: string
          description: エラーメッセージ
      required:
        - status
        - message
