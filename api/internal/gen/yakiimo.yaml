openapi: "3.0,0"
info:
  title: 焼き芋通知焼き上がり通知
  version: 1.0.0

paths:
  /notify/ready:
    post:
      summary: 焼き芋の焼き上がりを通知
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/requestYakiimoNotification"
      responses:
        200:
          description: 焼き上がり通知正常レスポンス
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseYakiimoNotification"
        500:
          description: 焼き上がり通知異常レスポンス
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responseYakiimoNotification"

components:
  schemas:
    requestYakiimoNotification:
      type: object
      description: 焼き芋通知焼き上がり通知パラメータ
      properties:
        machine_id:
          type: string
          format: uuid
          description: 機械ID
        finished_at:
          type: string
          description: 焼き上がり時間
        quantity:
          type: integer
          description: 焼き上がり個数
      required:
        - machine_id
        - finished_at
        - quantity
    responseYakiimoNotification:
      type: object
      description: 焼き上がり通知正常レスポンス
      properties:
        status:
          type: string
          description: 送信ステータス
      required:
        - status
